version: 2

updates:
  # Root monorepo dependencies (turbo, husky, prettier)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns: ["*"]
        dependency-type: development

  # Website app
  - package-ecosystem: npm
    directory: /apps/website
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      testing:
        patterns: ["vitest", "@testing-library/*", "@playwright/*", "@axe-core/*", "@vitest/*"]
      animation:
        patterns: ["gsap", "@gsap/*", "lenis"]

  # Newsletter app
  - package-ecosystem: npm
    directory: /apps/newsletter
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns: ["next", "react", "react-dom", "@types/react*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
